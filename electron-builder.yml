# Modified for cross-platform Windows support in 2026; see MODIFICATIONS.md.
appId: com.wassermanproductions.stemstudio
productName: Stem Studio
artifactName: Stem-Studio-${version}-${os}-${arch}.${ext}
afterPack: scripts/after-pack.mjs
directories:
  output: release
files:
  - out/**
  - package.json
extraResources:
  - from: python
    to: python
  - from: mcp/dist
    to: mcp
  - from: LICENSE
    to: LICENSE
  - from: NOTICE
    to: NOTICE
  - from: THIRD_PARTY_NOTICES.md
    to: THIRD_PARTY_NOTICES.md
  - from: FFMPEG_SOURCE_OFFER.md
    to: FFMPEG_SOURCE_OFFER.md
  - from: MODIFICATIONS.md
    to: MODIFICATIONS.md
  - from: assets-manifest.json
    to: assets-manifest.json
mac:
  category: public.app-category.music
  icon: build/icon.icns
  target:
    - target: dmg
      arch: [arm64]
    - target: zip
      arch: [arm64]
  # Ad-hoc / unsigned: no Developer ID signing identity on this machine. For
  # distribution beyond your own machines, set identity + notarize (Apple
  # Developer ID) — see README "Sharing builds".
  identity: null
  extraResources:
    - from: build/runtime/macos-arm64
      to: runtime-bootstrap/macos-arm64
win:
  icon: build/icon.ico
  executableName: Stem Studio
  requestedExecutionLevel: asInvoker
  target:
    - target: nsis
      arch: [x64]
  extraResources:
    - from: build/runtime/windows
      to: runtime-bootstrap/windows
nsis:
  oneClick: false
  perMachine: false
  allowElevation: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Stem Studio
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
linux:
  # Built for the NVIDIA DGX Spark (DGX OS / Ubuntu, arm64). AppImage runs
  # anywhere; the .deb installs on Debian/Ubuntu-based distros.
  maintainer: Sam Wasserman <sam@wassermanproductions.com>
  icon: build/icon.png
  category: AudioVideo
  target:
    - target: AppImage
      arch: [arm64]
    - target: deb
      arch: [arm64]
npmRebuild: false
